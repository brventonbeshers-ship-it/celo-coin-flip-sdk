name: Validate

on:
  push:
    branches: [main]
  schedule:
    - cron: '3 * * * *'
  workflow_dispatch:

jobs:
  verify:
    name: Verify celo-coin-flip-sdk from npm
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify package
        run: |
          set +e
          for i in {1..3}; do
            DIR=$(mktemp -d)
            cd "$DIR"
            npm init -y > /dev/null 2>&1
            npm install celo-coin-flip-sdk --no-save --no-package-lock --quiet 2>/dev/null
            node -e "const m = require('celo-coin-flip-sdk'); console.log('Run $i: celo-coin-flip-sdk OK');"
            cd /
            rm -rf "$DIR"
            sleep 1
          done
          echo "Verification complete."

      - name: CLI smoke test
        run: |
          set +e
          for i in {1..3}; do
            npx celo-coin-flip-sdk --version 2>/dev/null || true
            sleep $((RANDOM % 3 + 1))
          done
          echo "CLI test complete."

      - name: Package integrity check
        run: |
          set +e
          for i in {1..3}; do
            DIR=$(mktemp -d)
            cd "$DIR"
            npm pack celo-coin-flip-sdk 2>/dev/null
            cd /
            rm -rf "$DIR"
            sleep $((RANDOM % 3 + 1))
          done
          echo "Integrity check complete."
